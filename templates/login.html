{% extends "base.html" %}

{% block title %}Login - Attendance System{% endblock %}

{% block content %}
    <div class="flex-1 flex flex-col justify-center items-center px-4 py-8">
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-xl w-full max-w-md">
            <div class="flex justify-center mb-6">
                <img src="https://cdn-icons-png.flaticon.com/512/7275/7275886.png" alt="Logo" class="w-16 h-16" />
            </div>
            <h2 class="text-3xl font-extrabold mb-6 text-center text-indigo-800 tracking-tight">Welcome Back</h2>
            <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
                <button id="student-tab" onclick="toggleLogin('student')" class="flex-1 py-2 rounded-md bg-blue-500 text-white font-semibold shadow-sm transition-all duration-200">Student</button>
                <button id="admin-tab" onclick="toggleLogin('admin')" class="flex-1 py-2 rounded-md text-gray-600 font-semibold hover:bg-gray-200 transition-all duration-200">Admin</button>
            </div>
            {% if message %}
            <div class="mb-4 text-center text-red-600 bg-red-50 p-2 rounded">{{ message }}</div>
            {% endif %}
            <form id="student-form" method="POST" style="display: block;">
                <input type="hidden" name="login_type" value="student" />
                <div class="mb-4">
                    <label class="block mb-1 font-semibold text-gray-700">Roll No</label>
                    <input type="text" name="rollno" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Roll No" placeholder="Enter your Roll No" />
                </div>
                <div class="mb-6">
                    <label class="block mb-1 font-semibold text-gray-700">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Password" placeholder="Enter your Password" />
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:bg-indigo-700 transition">Login as Student</button>
            </form>
            <form id="admin-form" method="POST" style="display: none;">
                <input type="hidden" name="login_type" value="admin" />
                <div class="mb-4">
                    <label class="block mb-1 font-semibold text-gray-700">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Username" placeholder="Enter admin username" />
                </div>
                <div class="mb-6">
                    <label class="block mb-1 font-semibold text-gray-700">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Password" placeholder="Enter admin password" />
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:bg-indigo-700 transition">Login as Admin</button>
            </form>
            <div class="mt-6 text-center">
                <a href="/signup" class="text-indigo-600 font-medium hover:underline">Don't have an account? Signup</a>
            </div>
            <div class="mt-2 text-center">
                <a href="/" class="text-gray-500 text-sm hover:underline">&larr; Back to Home</a>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    function toggleLogin(type) {
        document.getElementById('student-form').style.display = type === 'student' ? 'block' : 'none';
        document.getElementById('admin-form').style.display = type === 'admin' ? 'block' : 'none';
        
        const studentTab = document.getElementById('student-tab');
        const adminTab = document.getElementById('admin-tab');
        
        if(type === 'student') {
            studentTab.className = "flex-1 py-2 rounded-md bg-indigo-600 text-white font-semibold shadow-sm transition-all duration-200";
            adminTab.className = "flex-1 py-2 rounded-md text-gray-600 font-semibold hover:bg-gray-200 transition-all duration-200";
        } else {
            adminTab.className = "flex-1 py-2 rounded-md bg-indigo-600 text-white font-semibold shadow-sm transition-all duration-200";
            studentTab.className = "flex-1 py-2 rounded-md text-gray-600 font-semibold hover:bg-gray-200 transition-all duration-200";
        }
    }
    // Default to student tab
    toggleLogin('student');
</script>
{% endblock %}

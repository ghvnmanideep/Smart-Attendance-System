{% extends "base.html" %}

{% block title %}Signup - Attendance System{% endblock %}

{% block content %}
    <div class="flex-1 flex flex-col justify-center items-center px-4 py-8">
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-xl w-full max-w-md">
            <div class="flex justify-center mb-6">
                <img src="https://cdn-icons-png.flaticon.com/512/7275/7275886.png" alt="Logo" class="w-16 h-16" />
            </div>
            <h2 class="text-3xl font-extrabold mb-6 text-center text-indigo-800 tracking-tight">Create Account</h2>
            {% if message %}
            <div class="mb-4 text-center text-green-700 bg-green-50 border border-green-200 p-3 rounded-lg">{{ message }}</div>
            {% endif %}
            <form method="POST" enctype="multipart/form-data" class="space-y-4">
                <div>
                    <label class="block mb-1 font-semibold text-gray-700">Roll No</label>
                    <input type="text" name="rollno" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Roll No" placeholder="e.g. 21B81A0500" />
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-700">Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Name" placeholder="Full Name" />
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-700">Class</label>
                    <input type="text" name="class" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Class" placeholder="e.g. 3rd Year" />
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-700">Branch</label>
                    <input type="text" name="branch" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Branch" placeholder="e.g. CSE" />
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-700">Mobile Number</label>
                    <input type="text" name="mobile" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Mobile Number" placeholder="Your Phone Number" />
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-700">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" title="Password" placeholder="Create a secure password" />
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:bg-indigo-700 transition mt-2">Submit Request</button>
            </form>
            <div class="mt-6 text-center">
                <a href="/login" class="text-indigo-600 font-medium hover:underline">Already have an account? Login</a>
            </div>
            <div class="mt-2 text-center">
                <a href="/" class="text-gray-500 text-sm hover:underline">&larr; Back to Home</a>
            </div>
        </div>
    </div>
{% endblock %}
